<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日全球热点新闻</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f23;color:#e2e8f0;padding:20px;max-width:800px;margin:0 auto;line-height:1.8}
h1{text-align:center;font-size:24px;margin-bottom:6px;background:linear-gradient(135deg,#7c5cfc,#00d2ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.date{text-align:center;color:#94a3b8;font-size:14px;margin-bottom:24px}
.section{margin-bottom:24px}
.section h2{font-size:18px;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.1);color:#7c5cfc}
.news-item{padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.news-item h3{font-size:15px;margin-bottom:4px}
.news-item p{font-size:13px;color:#94a3b8}
.placeholder{text-align:center;padding:60px 20px;color:#64748b}
.placeholder span{font-size:48px;display:block;margin-bottom:16px}
</style>
</head>
<body>
<h1>📰 每日全球热点新闻</h1>
<p class="date" id="dateStr"></p>
<div class="placeholder">
<span>⏳</span>
<p>新闻正在自动生成中…<br>每天 7:00 AM 自动更新</p>
</div>
<script>
document.getElementById('dateStr').textContent = new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
</script>
</body>
</html>
