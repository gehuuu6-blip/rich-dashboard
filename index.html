<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rich快乐小狗 · 智能工作台</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
:root{
--bg-primary:#0f0f23;--bg-secondary:#1a1a3e;--bg-card:#1e1e42;
--accent-purple:#7c5cfc;--accent-blue:#3b82f6;--accent-green:#10b981;
--accent-orange:#f59e0b;--accent-pink:#ec4899;--accent-red:#ef4444;--accent-cyan:#06b6d4;
--text-primary:#e2e8f0;--text-secondary:#94a3b8;--border:#2d2d5e;
--glow-purple:0 0 20px rgba(124,92,252,0.3)
}
body{background:var(--bg-primary);color:var(--text-primary);min-height:100vh;overflow-x:hidden}
.dashboard{max-width:1400px;margin:0 auto;padding:20px}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:20px 0 30px;border-bottom:1px solid var(--border);margin-bottom:30px}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--accent-purple),var(--accent-blue));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:var(--glow-purple)}
.logo-text h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-text p{font-size:12px;color:var(--text-secondary);margin-top:2px}
.header-right{display:flex;align-items:center;gap:16px}
.status-badge{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500}
.status-online{background:rgba(16,185,129,0.15);color:#10b981;border:1px solid rgba(16,185,129,0.3)}
.status-dot{width:8px;height:8px;border-radius:50%;background:#10b981;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.time-display{font-size:13px;color:var(--text-secondary);text-align:right}
.time-display .date{font-size:11px}
.last-update{font-size:10px;color:var(--text-secondary);opacity:0.7}

/* Stats Grid */
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:30px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:18px;position:relative;overflow:hidden;transition:all 0.3s}
.stat-card:hover{transform:translateY(-2px);border-color:var(--accent-purple)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0}
.stat-card:nth-child(1)::before{background:linear-gradient(90deg,var(--accent-purple),var(--accent-blue))}
.stat-card:nth-child(2)::before{background:linear-gradient(90deg,var(--accent-green),#34d399)}
.stat-card:nth-child(3)::before{background:linear-gradient(90deg,var(--accent-orange),#fbbf24)}
.stat-card:nth-child(4)::before{background:linear-gradient(90deg,var(--accent-cyan),#22d3ee)}
.stat-card:nth-child(5)::before{background:linear-gradient(90deg,var(--accent-pink),#f472b6)}
.stat-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:10px}
.stat-icon.purple{background:rgba(124,92,252,0.15);color:var(--accent-purple)}
.stat-icon.green{background:rgba(16,185,129,0.15);color:var(--accent-green)}
.stat-icon.orange{background:rgba(245,158,11,0.15);color:var(--accent-orange)}
.stat-icon.cyan{background:rgba(6,182,212,0.15);color:var(--accent-cyan)}
.stat-icon.pink{background:rgba(236,72,153,0.15);color:var(--accent-pink)}
.stat-value{font-size:26px;font-weight:700;margin-bottom:3px}
.stat-label{font-size:12px;color:var(--text-secondary)}

/* Main Grid */
.main-grid{display:grid;gap:20px;margin-bottom:30px}
.row-2col{grid-template-columns:1fr 1fr}
.row-schedule{grid-template-columns:1fr 1fr 320px}
.panel{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:24px;transition:all 0.3s}
.panel:hover{border-color:rgba(124,92,252,0.4)}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.panel-title{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.panel-title i{color:var(--accent-purple)}
.panel-badge{font-size:11px;padding:3px 10px;border-radius:10px;background:rgba(124,92,252,0.15);color:var(--accent-purple)}

/* Schedule */
.schedule-list{display:flex;flex-direction:column;gap:4px}
.schedule-item{display:flex;align-items:stretch;border-radius:10px;overflow:hidden;border:1px solid transparent;transition:all 0.3s;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.schedule-item:hover{border-color:rgba(124,92,252,0.3)}
.schedule-item.active{border-color:var(--accent-purple);background:rgba(124,92,252,0.06)}
.schedule-item.completed .schedule-body .schedule-info h4{text-decoration:line-through;opacity:0.5}
.schedule-item.completed{background:rgba(16,185,129,0.08);border-color:rgba(16,185,129,0.25)}
.schedule-item.completed .schedule-time{background:rgba(16,185,129,0.12)}
.schedule-time{width:110px;padding:10px 12px;background:var(--bg-secondary);display:flex;flex-direction:column;justify-content:center;flex-shrink:0;border-right:1px solid var(--border)}
.schedule-time .time{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
.schedule-time .duration{font-size:10px;color:var(--text-secondary)}
.schedule-body{flex:1;padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.schedule-info h4{font-size:12px;font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.schedule-info p{font-size:11px;color:var(--text-secondary)}
.schedule-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.icon-spirit{background:rgba(168,85,247,0.15);color:#a855f7}
.icon-family{background:rgba(251,191,36,0.15);color:#fbbf24}
.icon-focus{background:rgba(124,92,252,0.15);color:#7c5cfc}
.icon-lunch{background:rgba(16,185,129,0.15);color:#10b981}
.icon-work{background:rgba(59,130,246,0.15);color:#3b82f6}
.icon-gym{background:rgba(239,68,68,0.15);color:#ef4444}
.icon-home{background:rgba(6,182,212,0.15);color:#06b6d4}
.icon-review{background:rgba(245,158,11,0.15);color:#f59e0b}
.icon-sleep{background:rgba(99,102,241,0.15);color:#6366f1}

/* Project Cards */
.project-list{display:flex;flex-direction:column;gap:10px}
.project-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-radius:12px;background:var(--bg-secondary);border:1px solid transparent;transition:all 0.3s;cursor:pointer}
.project-item:hover{border-color:var(--accent-purple);background:rgba(124,92,252,0.08)}
.project-left{display:flex;align-items:center;gap:12px}
.project-emoji{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.project-info h4{font-size:13px;font-weight:600;margin-bottom:2px}
.project-info p{font-size:11px;color:var(--text-secondary)}
.project-right{text-align:right}
.project-status{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:500}
.status-active{background:rgba(16,185,129,0.15);color:#10b981}
.status-planning{background:rgba(245,158,11,0.15);color:#f59e0b}
.status-review{background:rgba(59,130,246,0.15);color:#3b82f6}

/* Task List */
.task-list{display:flex;flex-direction:column;gap:8px}
.task-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;background:var(--bg-secondary);font-size:13px}
.task-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;flex-shrink:0}
.task-check.done{background:var(--accent-green);border-color:var(--accent-green)}
.task-check.done i{display:block;color:#fff;font-size:12px}
.task-check i{display:none}
.task-text{flex:1}
.task-text.done{text-decoration:line-through;color:var(--text-secondary)}
.task-priority{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:600}
.priority-high{background:rgba(239,68,68,0.15);color:#ef4444}
.priority-medium{background:rgba(245,158,11,0.15);color:#f59e0b}
.priority-low{background:rgba(59,130,246,0.15);color:#3b82f6}

/* Chart */
.chart-container{position:relative;height:200px}

/* Team Grid */
.team-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.team-card{text-align:center;padding:16px;border-radius:12px;background:var(--bg-secondary);transition:all 0.3s}
.team-card:hover{background:rgba(124,92,252,0.1)}
.team-avatar{width:44px;height:44px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:20px}
.team-name{font-size:13px;font-weight:600;margin-bottom:2px}
.team-role{font-size:10px;color:var(--text-secondary)}

/* Tools Grid */
.tools-section{margin-top:20px}
.tools-title{font-size:15px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.tools-title i{color:var(--accent-blue)}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.tool-item{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 10px;border-radius:14px;background:var(--bg-card);border:1px solid var(--border);transition:all 0.3s;cursor:pointer;font-size:12px;text-align:center}
.tool-item:hover{border-color:var(--accent-purple);transform:translateY(-2px);box-shadow:var(--glow-purple)}
.tool-item i{font-size:22px}

/* Activity */
.activity-list{display:flex;flex-direction:column;gap:10px}
.activity-item{display:flex;gap:12px;padding:10px;border-radius:10px;background:var(--bg-secondary)}
.activity-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.activity-icon.news{background:rgba(59,130,246,0.15);color:#3b82f6}
.activity-icon.doc{background:rgba(124,92,252,0.15);color:#7c5cfc}
.activity-icon.task{background:rgba(16,185,129,0.15);color:#10b981}
.activity-icon.alert{background:rgba(245,158,11,0.15);color:#f59e0b}
.activity-content h4{font-size:12px;font-weight:600;margin-bottom:2px}
.activity-content p{font-size:11px;color:var(--text-secondary)}

/* Loading */
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg-primary);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px}
.loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent-purple);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){
.stats-grid{grid-template-columns:repeat(2,1fr)}
.main-grid{grid-template-columns:1fr !important}
.row-schedule{grid-template-columns:1fr !important}
.team-grid{grid-template-columns:repeat(2,1fr)}
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg-primary)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div style="color:var(--text-secondary);font-size:13px">正在加载数据...</div>
</div>

<div class="dashboard" id="app" style="opacity:0;transition:opacity 0.5s">

<!-- Header -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">🌸</div>
    <div class="logo-text">
      <h1 id="dashTitle">Rich快乐小狗 · 智能工作台</h1>
      <p id="dashSubtitle">HUALUMI EDUCATION · SMART DASHBOARD</p>
    </div>
  </div>
  <div class="header-right">
    <div class="time-display">
      <div id="currentTime" style="font-size:18px;font-weight:600;color:var(--text-primary)">--:--</div>
      <div id="currentDate" class="date">----年--月--日</div>
      <div id="lastUpdate" class="last-update">数据加载中...</div>
    </div>
    <div class="status-badge status-online">
      <span class="status-dot"></span> AI 助手在线
    </div>
  </div>
</div>

<!-- Stats -->
<div class="stats-grid" id="statsGrid"></div>

<!-- Schedule + Projects + Tasks -->
<div class="main-grid row-schedule">

  <!-- Daily Schedule -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title"><i class="ri-calendar-schedule-line"></i> 陛下每日执行蓝图</div>
      <span class="panel-badge" id="scheduleProgress">0/0 已完成</span>
    </div>
    <div class="schedule-list" id="scheduleList"></div>
  </div>

  <!-- Projects + Tasks -->
  <div style="display:flex;flex-direction:column;gap:20px">
    <div class="panel" style="flex:1">
      <div class="panel-header">
        <div class="panel-title"><i class="ri-rocket-2-line"></i> 项目看板</div>
        <span class="panel-badge" id="projectCount">0 个项目</span>
      </div>
      <div class="project-list" id="projectList"></div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title"><i class="ri-check-double-line"></i> 近期待办</div>
        <span class="panel-badge" id="todoCount">0 项</span>
      </div>
      <div class="task-list" id="todoList"></div>
    </div>
  </div>

  <!-- Right Sidebar -->
  <div style="display:flex;flex-direction:column;gap:20px">
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title"><i class="ri-bar-chart-2-line"></i> 项目进度</div>
      </div>
      <div class="chart-container"><canvas id="projectChart"></canvas></div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title"><i class="ri-user-star-line"></i> 师资团队</div>
        <span class="panel-badge" id="teamCount">0 位</span>
      </div>
      <div class="team-grid" id="teamGrid"></div>
    </div>
    <div class="panel" style="flex:1">
      <div class="panel-header">
        <div class="panel-title"><i class="ri-time-line"></i> 近期动态</div>
      </div>
      <div class="activity-list" id="activityList"></div>
    </div>
  </div>
</div>

<!-- AI Tools -->
<div class="tools-section">
  <div class="tools-title"><i class="ri-magic-line"></i> AI 能力中心</div>
  <div class="tools-grid" id="toolsGrid"></div>
</div>

</div>

<script>
const SCHEDULE_ICONS = ['icon-spirit','icon-family','icon-focus','icon-lunch','icon-work','icon-gym','icon-home','icon-review','icon-sleep'];
const SCHEDULE_RI = ['ri-sparkling-line','ri-heart-line','ri-focus-3-line','ri-restaurant-line','ri-briefcase-line','ri-boxing-line','ri-home-heart-line','ri-quill-pen-line','ri-moon-line'];
const TOOL_ICONS = {'信息研究':'ri-search-eye-line','文档生成':'ri-file-text-line','数据分析':'ri-bar-chart-grouped-line','日程管理（关联 Google 日历）':'ri-calendar-schedule-line','邮件助手':'ri-mail-send-line','新闻摘要':'ri-newspaper-line','翻译工具':'ri-translate-2','图片生成':'ri-image-line','代码助手':'ri-code-s-slash-line','财务分析':'ri-funds-line','市场调研':'ri-search-line','项目管理':'ri-kanban-line','知识库':'ri-book-open-line','内容创作':'ri-quill-pen-line','视频脚本':'ri-video-line','学习助手':'ri-brain-line'};
const TOOL_COLORS = ['#f59e0b','#3b82f6','#10b981','#ec4899','#8b5cf6','#06b6d4','#f43f5e','#22d3ee','#a855f7','#f97316','#14b8a6','#6366f1','#84cc16','#d946ef','#0ea5e9','#ef4444'];
const TEAM_COLORS = [['#667eea','#764ba2'],['#f093fb','#f5576c'],['#4facfe','#00f2fe'],['#43e97b','#38f9d7']];
const TEAM_EMOJIS = ['🤖','✍️','🌍','📖','🎵','📊','💡','🏆'];

let appData = null;
let chartInstance = null;

async function loadData() {
  try {
    const base = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
    const res = await fetch(base + 'data.json?t=' + Date.now());
    appData = await res.json();
    render();
    // Auto refresh every 60s
    setInterval(loadData, 60000);
  } catch(e) {
    console.error('Failed to load data:', e);
    document.getElementById('lastUpdate').textContent = '数据加载失败，请检查网络';
  }
}

function render() {
  if (!appData) return;
  const d = appData;

  // Header
  document.getElementById('dashTitle').textContent = d.dashboard.title;
  document.getElementById('dashSubtitle').textContent = d.dashboard.subtitle;

  // Stats
  const statsHtml = [
    {icon:'ri-folder-3-line',cls:'purple',value:d.stats.active_projects,label:'活跃项目'},
    {icon:'ri-team-line',cls:'green',value:d.stats.team_members,label:'师资团队'},
    {icon:'ri-calendar-check-line',cls:'orange',value:d.stats.schedule_items,label:'日程事项'},
    {icon:'ri-video-line',cls:'cyan',value:d.stats.pending_videos,label:'待上传视频'},
    {icon:'ri-advertisement-line',cls:'pink',value:d.stats.marketing_activities,label:'营销活动'},
  ].map(s=>`<div class="stat-card"><div class="stat-icon ${s.cls}"><i class="${s.icon}"></i></div><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div></div>`).join('');
  document.getElementById('statsGrid').innerHTML = statsHtml;

  // Schedule
  const completedCount = d.schedule.filter(s=>s.completed).length;
  document.getElementById('scheduleProgress').textContent = `${completedCount}/${d.schedule.length} 已完成`;
  const scheduleHtml = d.schedule.map((s,i) => {
    const startH = parseInt(s.time.split(':')[0]);
    const endH = parseInt(s.end.split(':')[0]);
    const dur = endH - startH || 1;
    const iconIdx = i % SCHEDULE_ICONS.length;
    return `<div class="schedule-item${s.completed?' completed':''}" onclick="toggleSchedule(this,${i})">
      <div class="schedule-time"><span class="time">${s.time}</span><span class="duration">${dur}h</span></div>
      <div class="schedule-body">
        <div class="schedule-info"><h4>${s.task}</h4></div>
        <div class="schedule-icon ${SCHEDULE_ICONS[iconIdx]}"><i class="${SCHEDULE_RI[iconIdx]}"></i></div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('scheduleList').innerHTML = scheduleHtml;

  // Projects
  document.getElementById('projectCount').textContent = d.projects.length + ' 个项目';
  const projectEmojis = ['🎨','🎓','🇦🇺','📱','💚','🚀','📚','🎯'];
  const projectBgs = ['rgba(124,92,252,0.15)','rgba(59,130,246,0.15)','rgba(6,182,212,0.15)','rgba(239,68,68,0.15)','rgba(16,185,129,0.15)','rgba(245,158,11,0.15)','rgba(168,85,247,0.15)','rgba(6,182,212,0.15)'];
  const projectHtml = d.projects.map((p,i) => {
    const sc = p.status_color || 'green';
    const statusCls = sc==='green'?'status-active':sc==='orange'?'status-planning':'status-review';
    return `<div class="project-item">
      <div class="project-left">
        <div class="project-emoji" style="background:${projectBgs[i%projectBgs.length]}">${projectEmojis[i%projectEmojis.length]}</div>
        <div class="project-info"><h4>${p.name}</h4><p>${p.description}</p></div>
      </div>
      <div class="project-right"><span class="project-status ${statusCls}">${p.status}</span></div>
    </div>`;
  }).join('');
  document.getElementById('projectList').innerHTML = projectHtml;

  // Todos
  document.getElementById('todoCount').textContent = d.todos.length + ' 项';
  const todoHtml = d.todos.map(t => {
    const priCls = t.urgent?'priority-high':'priority-low';
    const priText = t.urgent?'紧急':'一般';
    return `<div class="task-item">
      <div class="task-check${t.completed?' done':''}" onclick="toggleTask(this,${d.todos.indexOf(t)})"><i class="ri-check-line"></i></div>
      <span class="task-text${t.completed?' done':''}">${t.text}</span>
      <span class="task-priority ${priCls}">${priText}</span>
    </div>`;
  }).join('');
  document.getElementById('todoList').innerHTML = todoHtml;

  // Team
  document.getElementById('teamCount').textContent = d.team.length + ' 位';
  const teamHtml = d.team.map((t,i) => `<div class="team-card">
    <div class="team-avatar" style="background:linear-gradient(135deg,${TEAM_COLORS[i%TEAM_COLORS.length].join(',')})">${TEAM_EMOJIS[i%TEAM_EMOJIS.length]}</div>
    <div class="team-name">${t.name}</div>
    <div class="team-role">${t.role}${t.contact?' · '+t.contact:''}</div>
  </div>`).join('');
  document.getElementById('teamGrid').innerHTML = teamHtml;

  // Activity
  const actIcons = ['doc','task','news','alert'];
  const actRis = ['ri-file-word-line','ri-check-line','ri-newspaper-line','ri-advertisement-line'];
  const activityHtml = d.recent_updates.map((a,i) => `<div class="activity-item">
    <div class="activity-icon ${actIcons[i%actIcons.length]}"><i class="${actRis[i%actRis.length]}"></i></div>
    <div class="activity-content"><h4>${a.text}</h4><p>${a.date}</p></div>
  </div>`).join('');
  document.getElementById('activityList').innerHTML = activityHtml;

  // Tools
  const toolsHtml = d.ai_tools.map((t,i) => {
    const icon = TOOL_ICONS[t] || 'ri-magic-line';
    const color = TOOL_COLORS[i%TOOL_COLORS.length];
    return `<div class="tool-item"><i class="${icon}" style="color:${color}"></i>${t}</div>`;
  }).join('');
  document.getElementById('toolsGrid').innerHTML = toolsHtml;

  // Chart
  renderChart(d);

  // Last update
  document.getElementById('lastUpdate').textContent = '数据更新: ' + new Date().toLocaleTimeString('zh-CN');

  // Show app
  document.getElementById('app').style.opacity = '1';
  document.getElementById('loadingOverlay').style.display = 'none';
}

function renderChart(d) {
  if (chartInstance) chartInstance.destroy();
  const ctx = document.getElementById('projectChart').getContext('2d');
  const colors = ['#7c5cfc','#3b82f6','#06b6d4','#ef4444','#10b981','#f59e0b','#a855f7','#ec4899'];
  chartInstance = new Chart(ctx, {
    type:'doughnut',
    data:{
      labels: d.projects.map(p=>p.name),
      datasets:[{data: d.projects.map(p=>Math.floor(Math.random()*30)+10),backgroundColor:colors.slice(0,d.projects.length),borderWidth:0,borderRadius:4,spacing:3}]
    },
    options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{size:9},padding:6,usePointStyle:true,pointStyleWidth:8}}}}
  });
}

// Toggle schedule — 用 ☑️ localStorage 按日期保存
function getTodayKey() { return 'schedule_' + new Date().toISOString().slice(0, 10); }
function loadChecked() { try { return JSON.parse(localStorage.getItem(getTodayKey())) || {}; } catch(e) { return {}; } }
function saveChecked(map) { localStorage.setItem(getTodayKey(), JSON.stringify(map)); }

function toggleSchedule(el, idx) {
  const checked = loadChecked();
  checked[idx] = !checked[idx];
  saveChecked(checked);
  applyScheduleState(el, idx, checked[idx]);
  updateScheduleProgress();
}

function applyScheduleState(el, idx, done) {
  if (done) {
    el.classList.add('completed');
    el.classList.remove('active');
    // 勾选效果：划线 + 绿色背景
    if (!el.querySelector('.check-mark')) {
      const mark = document.createElement('span');
      mark.className = 'check-mark';
      mark.textContent = '✅';
      mark.style.cssText = 'font-size:16px;flex-shrink:0;';
      el.querySelector('.schedule-body').insertBefore(mark, el.querySelector('.schedule-body').firstChild);
    }
  } else {
    el.classList.remove('completed');
    const mark = el.querySelector('.check-mark');
    if (mark) mark.remove();
  }
}

function updateScheduleProgress() {
  const checked = loadChecked();
  const total = appData.schedule.length;
  const count = Object.values(checked).filter(Boolean).length;
  document.getElementById('scheduleProgress').textContent = count + '/' + total + ' 已完成';
}

function restoreScheduleChecks() {
  const checked = loadChecked();
  const items = document.querySelectorAll('.schedule-item');
  items.forEach((el, idx) => {
    if (checked[idx]) applyScheduleState(el, idx, true);
  });
  updateScheduleProgress();
}

// Toggle task (visual only)
function toggleTask(el, idx) {
  el.classList.toggle('done');
  el.parentElement.querySelector('.task-text').classList.toggle('done');
}

// Clock
function updateClock(){
  const now=new Date();
  document.getElementById('currentTime').textContent=now.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('currentDate').textContent=now.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
}
updateClock();setInterval(updateClock,1000);

// Start
loadData().then(() => {
  // 恢复今日打勾状态
  setTimeout(restoreScheduleChecks, 100);
});
</script>
</body>
</html>
